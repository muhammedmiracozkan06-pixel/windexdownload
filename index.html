<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windex OS | Hafifliğin Zirvesi</title>
    <style>
        :root {
            --primary: #0078d4;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: var(--gray);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 500px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #0078d4, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            background: #252525;
            padding: 1rem;
            border-radius: 10px;
        }

        .stat-item span {
            display: block;
            font-weight: bold;
            color: var(--primary);
        }

        .download-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 120, 212, 0.4);
        }

        .download-btn:hover {
            transform: scale(1.05);
            background: #0086ed;
            box-shadow: 0 8px 20px rgba(0, 120, 212, 0.6);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WINDEX OS</h1>
        <p>Ana sistemi yormayan, işlemciyi kasmayan tek çözüm.</p>

        <div class="stats">
            <div class="stat-item">
                <span>957 MB</span>
                RAM Kullanımı
            </div>
            <div class="stat-item">
                <span>%65</span>
                İşlemci Sınırı
            </div>
            <div class="stat-item">
                <span>windex one(1 ubuntu)</span>
                Sürüm
            </div>
        </div>

        <a href="#" class="download-btn">iso görüntüsünü indir (.ISO)</a>

        <div class="footer">
            wind tarafından geliştirilip sunuldu.
        </div>
    </div>

</body>
</html>
